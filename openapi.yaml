openapi: 3.0.3
info:
  title: NEW API SYSTEM
  version: 1.0.0
  description: REST API for supply chain traceability MVP.
servers:
  - url: http://localhost:5000
    description: Local
security:
  - bearerAuth: []
tags:
  - name: Health
  - name: Admin
  - name: Producer
  - name: Processor
  - name: Distributor
  - name: Warehouse
  - name: Retailer
  - name: Public
paths:
  /health:
    get:
      tags: [Health]
      security: []
      summary: Health check
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true

  /api/v1/admin/login:
    post:
      tags: [Admin]
      security: []
      summary: Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: JWT token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'

  /api/v1/admin/producers/pending:
    get:
      tags: [Admin]
      summary: List unverified producers
      responses:
        '200':
          description: Producer list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Producer'

  /api/v1/admin/producers/{producerId}/verify:
    patch:
      tags: [Admin]
      summary: Verify a producer
      parameters:
        - in: path
          name: producerId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Updated producer
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Producer'

  /api/v1/admin/products:
    get:
      tags: [Admin]
      summary: List all processed products
      responses:
        '200':
          description: Processed product list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProcessedProduct'

  /api/v1/admin/producers:
    get:
      tags: [Admin]
      summary: List all producers
      responses:
        '200':
          description: Producer list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Producer'

  /api/v1/admin/accounts/pending:
    get:
      tags: [Admin]
      summary: List all unverified accounts grouped by entity type
      responses:
        '200':
          description: Unverified accounts grouped by type
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PendingAccountsResponse'

  /api/v1/admin/accounts/pending/{entityType}:
    get:
      tags: [Admin]
      summary: List unverified accounts by entity type
      parameters:
        - in: path
          name: entityType
          required: true
          schema:
            type: string
            enum: [producer, processor, distributor, warehouse, retailer]
      responses:
        '200':
          description: Unverified accounts list
          content:
            application/json:
              schema:
                type: array
                items:
                  oneOf:
                    - $ref: '#/components/schemas/Producer'
                    - $ref: '#/components/schemas/ProcessorAccount'
                    - $ref: '#/components/schemas/DistributorAccount'
                    - $ref: '#/components/schemas/WarehouseAccount'
                    - $ref: '#/components/schemas/RetailerAccount'
        '400':
          description: Invalid entity type
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/admin/accounts/{entityType}/{entityId}/verify:
    patch:
      tags: [Admin]
      summary: Verify any entity account by type and id
      parameters:
        - in: path
          name: entityType
          required: true
          schema:
            type: string
            enum: [producer, processor, distributor, warehouse, retailer]
        - in: path
          name: entityId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Updated verified account
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/Producer'
                  - $ref: '#/components/schemas/ProcessorAccount'
                  - $ref: '#/components/schemas/DistributorAccount'
                  - $ref: '#/components/schemas/WarehouseAccount'
                  - $ref: '#/components/schemas/RetailerAccount'
        '400':
          description: Invalid entity type
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Entity not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/producer/register:
    post:
      tags: [Producer]
      security: []
      summary: Register producer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProducerRegisterRequest'
      responses:
        '201':
          description: Producer created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: string }
                  isVerified: { type: boolean }

  /api/v1/producer/login:
    post:
      tags: [Producer]
      security: []
      summary: Producer login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: JWT token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'

  /api/v1/producer/me:
    get:
      tags: [Producer]
      summary: Producer profile
      responses:
        '200':
          description: Profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Producer'

  /api/v1/producer/products:
    post:
      tags: [Producer]
      summary: Add raw product
      description: Body shape depends on producerType in JWT.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/FarmerFields'
                - $ref: '#/components/schemas/WoodFields'
                - $ref: '#/components/schemas/DairyMeatFields'
      responses:
        '201':
          description: Raw product created
          content:
            application/json:
              schema:
                type: object
                properties:
                  rawProductId: { type: string }
                  qrCodeUrl: { type: string }
    get:
      tags: [Producer]
      summary: List own raw products
      responses:
        '200':
          description: Raw products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RawProduct'

  /api/v1/processor/register:
    post:
      tags: [Processor]
      security: []
      summary: Register processor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompanyRegisterRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdResponse'

  /api/v1/processor/login:
    post:
      tags: [Processor]
      security: []
      summary: Processor login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: JWT token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'

  /api/v1/processor/batches:
    post:
      tags: [Processor]
      summary: Create open batch
      responses:
        '201':
          description: Batch created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Batch'

  /api/v1/processor/batches/{batchId}/scan:
    post:
      tags: [Processor]
      summary: Scan raw product into batch
      parameters:
        - in: path
          name: batchId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [rawProductId]
              properties:
                rawProductId: { type: string }
      responses:
        '200':
          description: Updated batch
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Batch'

  /api/v1/processor/batches/{batchId}:
    get:
      tags: [Processor]
      summary: Get batch details
      parameters:
        - in: path
          name: batchId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Batch and raw products
          content:
            application/json:
              schema:
                type: object
                properties:
                  batch: { $ref: '#/components/schemas/Batch' }
                  rawProducts:
                    type: array
                    items:
                      $ref: '#/components/schemas/RawProduct'

  /api/v1/processor/batches/{batchId}/close:
    post:
      tags: [Processor]
      summary: Close open batch
      parameters:
        - in: path
          name: batchId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Closed batch
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Batch'

  /api/v1/processor/products:
    post:
      tags: [Processor]
      summary: Create processed product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProcessedProductRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  masterProductId: { type: string }
                  qrCodeUrl: { type: string }
    get:
      tags: [Processor]
      summary: List own processed products
      responses:
        '200':
          description: Products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProcessedProduct'

  /api/v1/distributor/register:
    post:
      tags: [Distributor]
      security: []
      summary: Register distributor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompanyRegisterRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdResponse'

  /api/v1/distributor/login:
    post:
      tags: [Distributor]
      security: []
      summary: Distributor login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: JWT token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'

  /api/v1/distributor/scan:
    post:
      tags: [Distributor]
      summary: Scan master product and detect next leg
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [masterProductId]
              properties:
                masterProductId: { type: string }
      responses:
        '200':
          description: Next leg
          content:
            application/json:
              schema:
                type: object
                properties:
                  masterProductId: { type: string }
                  nextLeg:
                    type: string
                    enum: [leg1, leg2, warehouse_pending]

  /api/v1/distributor/dispatch/leg1:
    post:
      tags: [Distributor]
      summary: Log leg1 dispatch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DispatchRequest'
      responses:
        '200':
          description: Updated processed product
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProcessedProduct'
        '409':
          description: Leg 1 already assigned or product missing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/distributor/dispatch/leg1/{masterProductId}/received:
    patch:
      tags: [Distributor]
      summary: Mark leg1 received
      parameters:
        - in: path
          name: masterProductId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LegReceivedRequest'
      responses:
        '200':
          description: Leg 1 details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DistributionLeg'
        '404':
          description: Leg 1 dispatch not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/distributor/dispatch/leg2:
    post:
      tags: [Distributor]
      summary: Log leg2 dispatch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DispatchRequest'
      responses:
        '200':
          description: Updated processed product
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProcessedProduct'
        '404':
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Warehouse dispatch required first or leg already assigned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/distributor/dispatch/leg2/{masterProductId}/received:
    patch:
      tags: [Distributor]
      summary: Mark leg2 received
      parameters:
        - in: path
          name: masterProductId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LegReceivedRequest'
      responses:
        '200':
          description: Leg 2 details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DistributionLeg'
        '404':
          description: Leg 2 dispatch not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/distributor/history:
    get:
      tags: [Distributor]
      summary: List distributor history
      responses:
        '200':
          description: History items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DistributorHistory'

  /api/v1/warehouse/register:
    post:
      tags: [Warehouse]
      security: []
      summary: Register warehouse
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WarehouseRegisterRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdResponse'

  /api/v1/warehouse/login:
    post:
      tags: [Warehouse]
      security: []
      summary: Warehouse login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: JWT token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'

  /api/v1/warehouse/receive:
    post:
      tags: [Warehouse]
      summary: Receive product at warehouse
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WarehouseReceiveRequest'
      responses:
        '200':
          description: Warehouse stop details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WarehouseStop'
        '404':
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Leg 1 not completed or warehouse stop already filled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/warehouse/dispatch/{masterProductId}:
    patch:
      tags: [Warehouse]
      summary: Dispatch product from warehouse
      parameters:
        - in: path
          name: masterProductId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [dispatchedAt]
              properties:
                dispatchedAt:
                  type: string
                  format: date-time
      responses:
        '200':
          description: Updated warehouse stop
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WarehouseStop'
        '404':
          description: Warehouse record not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/warehouse/history:
    get:
      tags: [Warehouse]
      summary: List warehouse history
      responses:
        '200':
          description: History items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WarehouseHistory'

  /api/v1/retailer/register:
    post:
      tags: [Retailer]
      security: []
      summary: Register retailer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RetailerRegisterRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdResponse'

  /api/v1/retailer/login:
    post:
      tags: [Retailer]
      security: []
      summary: Retailer login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: JWT token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'

  /api/v1/retailer/receive:
    post:
      tags: [Retailer]
      summary: Receive product at retailer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RetailerReceiveRequest'
      responses:
        '200':
          description: Retailer stop
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RetailerStop'
        '404':
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Leg 2 not completed or retailer stop already filled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/retailer/history:
    get:
      tags: [Retailer]
      summary: List retailer history
      responses:
        '200':
          description: History items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RetailerHistory'

  /api/v1/public/product/{masterProductId}:
    get:
      tags: [Public]
      security: []
      summary: Public traceability by master product ID
      parameters:
        - in: path
          name: masterProductId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Enriched traceability object
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '404':
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/public/product/raw/{rawProductId}:
    get:
      tags: [Public]
      security: []
      summary: Public raw product origin details
      parameters:
        - in: path
          name: rawProductId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Raw product details
          content:
            application/json:
              schema:
                type: object
                allOf:
                  - $ref: '#/components/schemas/RawProduct'
                  - type: object
                    properties:
                      producerName:
                        type: string
                        nullable: true
        '404':
          description: Raw product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/public/traceability/{masterProductId}:
    get:
      tags: [Public]
      security: []
      summary: Full traceability details by master product ID
      parameters:
        - in: path
          name: masterProductId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Aggregated traceability data across all entities
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '404':
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/reports:
    post:
      tags: [Public]
      security: []
      summary: Create a consumer report
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReportRequest'
      responses:
        '201':
          description: Report created
          content:
            application/json:
              schema:
                type: object
                properties:
                  reportId: { type: string }
        '400':
          description: Invalid request payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Master product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/reports/{reportId}:
    get:
      tags: [Public]
      security: []
      summary: Get report details by report ID
      parameters:
        - in: path
          name: reportId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Report details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Report'
        '404':
          description: Report not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/reports/admin/all:
    get:
      tags: [Admin]
      summary: Get all reports
      responses:
        '200':
          description: List of reports
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Report'

  /api/v1/reports/admin/{reportId}/phase:
    patch:
      tags: [Admin]
      summary: Update report phase
      parameters:
        - in: path
          name: reportId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateReportPhaseRequest'
      responses:
        '200':
          description: Updated report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Report'
        '400':
          description: Invalid phase
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Report not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/reports/admin/{reportId}/conclusion:
    patch:
      tags: [Admin]
      summary: Add report conclusion
      parameters:
        - in: path
          name: reportId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateReportConclusionRequest'
      responses:
        '200':
          description: Updated report with conclusion
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Report'
        '400':
          description: conclusion is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Report not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Report must be in FIX phase before conclusion update
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string }
    TokenResponse:
      type: object
      properties:
        token: { type: string }
      required: [token]
    IdResponse:
      type: object
      properties:
        id: { type: string }
      required: [id]
    ErrorResponse:
      type: object
      properties:
        error: { type: string }
      required: [error]
    ProducerRegisterRequest:
      type: object
      required: [name, email, password, producerType]
      properties:
        name: { type: string }
